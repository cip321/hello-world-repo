name: Scripted Pipeline
on:
  push:
    branches:
      - feature-testing
  workflow_dispatch:

jobs:
    Greet:
        runs-on: ubuntu-latest
        steps:
        - run: echo "Hello, World!"
    Build:
        runs-on: ubuntu-latest
        needs: Greet
        steps:
        - run: |
            echo "Pretending to build..."
            sleep 5s
    Results:
        runs-on: ubuntu-latest
        needs: Build
        steps:
        - run: echo "Job completed at $(date)"